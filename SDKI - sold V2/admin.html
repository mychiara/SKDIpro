<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — SDKI Pro License Manager</title>
    <meta name="robots" content="noindex, nofollow">
    <meta name="googlebot" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }
        
        /* Login */
        .login-wrap {
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 50%, #1e293b 100%);
        }
        .login-card {
            background: rgba(255,255,255,0.05); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 24px;
            padding: 3rem 2.5rem; text-align: center; max-width: 420px; width: 90%;
        }
        .login-card h1 { font-size: 1.6rem; margin-bottom: 0.5rem; }
        .login-card h1 span { color: #60a5fa; }
        .login-card p { color: #64748b; font-size: 0.9rem; margin-bottom: 2rem; }
        .login-card input {
            width: 100%; padding: 0.9rem 1.2rem; border: 2px solid rgba(255,255,255,0.1);
            border-radius: 14px; background: rgba(255,255,255,0.05); color: #f8fafc;
            font-size: 1rem; text-align: center; margin-bottom: 1rem;
        }
        .login-card input:focus { outline:none; border-color:#2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.2); }
        .login-err { color: #fca5a5; font-size: 0.85rem; margin-bottom: 1rem; display:none; }

        /* Layout */
        .app { display: none; }
        .topbar {
            background: rgba(15,23,42,0.95); border-bottom: 1px solid rgba(255,255,255,0.06);
            padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between;
            position: sticky; top:0; z-index:100; backdrop-filter: blur(10px);
        }
        .topbar h1 { font-size: 1.1rem; font-weight: 700; }
        .topbar h1 i { color: #3b82f6; margin-right: 0.5rem; }
        .topbar-actions { display: flex; gap: 0.5rem; }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }

        /* Stats */
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card {
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px; padding: 1.25rem; text-align: center;
        }
        .stat-card .num { font-size: 2rem; font-weight: 800; }
        .stat-card .label { font-size: 0.8rem; color: #64748b; margin-top: 0.25rem; }
        .stat-card.blue .num { color: #3b82f6; }
        .stat-card.green .num { color: #10b981; }
        .stat-card.yellow .num { color: #f59e0b; }
        .stat-card.red .num { color: #ef4444; }

        /* Toolbar */
        .toolbar { display:flex; gap:0.75rem; margin-bottom:1.5rem; flex-wrap:wrap; align-items:center; }
        .toolbar input {
            flex:1; min-width:200px; padding:0.7rem 1rem 0.7rem 2.5rem;
            border:1px solid rgba(255,255,255,0.1); border-radius:12px;
            background:rgba(255,255,255,0.05); color:#e2e8f0; font-size:0.9rem;
        }
        .toolbar input:focus { outline:none; border-color:#2563eb; }
        .search-wrap { position:relative; flex:1; min-width:200px; }
        .search-wrap i { position:absolute; left:0.9rem; top:50%; transform:translateY(-50%); color:#475569; }
        
        /* Buttons */
        .btn {
            display:inline-flex; align-items:center; gap:0.4rem; padding:0.6rem 1.2rem;
            border:none; border-radius:10px; font-size:0.85rem; font-weight:600;
            cursor:pointer; transition:all 0.2s; font-family:inherit;
        }
        .btn-primary { background:#2563eb; color:white; }
        .btn-primary:hover { background:#1d4ed8; }
        .btn-success { background:#059669; color:white; }
        .btn-success:hover { background:#047857; }
        .btn-danger { background:#dc2626; color:white; }
        .btn-danger:hover { background:#b91c1c; }
        .btn-warning { background:#d97706; color:white; }
        .btn-warning:hover { background:#b45309; }
        .btn-outline { background:transparent; border:1px solid rgba(255,255,255,0.15); color:#94a3b8; }
        .btn-outline:hover { border-color:#2563eb; color:#60a5fa; }
        .btn-sm { padding:0.4rem 0.8rem; font-size:0.78rem; border-radius:8px; }
        .btn-icon { background:transparent; border:none; color:#64748b; cursor:pointer; padding:0.4rem; font-size:1rem; }
        .btn-icon:hover { color:#e2e8f0; }

        /* Table */
        .table-wrap {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px; overflow: hidden;
        }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th {
            background: rgba(37,99,235,0.1); color: #93c5fd; font-weight: 600;
            padding: 0.8rem 1rem; text-align: left; white-space: nowrap;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        td {
            padding: 0.75rem 1rem; border-bottom: 1px solid rgba(255,255,255,0.04);
            vertical-align: middle;
        }
        tr:hover td { background: rgba(255,255,255,0.02); }
        .code-cell { font-family: monospace; font-weight: 700; color: #93c5fd; letter-spacing: 0.5px; }
        
        /* Status badges */
        .badge {
            display:inline-block; padding:0.2rem 0.7rem; border-radius:20px;
            font-size:0.75rem; font-weight:600; text-transform:capitalize;
        }
        .badge-aktif { background:rgba(16,185,129,0.15); color:#6ee7b7; }
        .badge-belum { background:rgba(100,116,139,0.2); color:#94a3b8; }
        .badge-expired { background:rgba(239,68,68,0.15); color:#fca5a5; }

        /* Modal */
        .modal-overlay {
            position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:200;
            display:none; align-items:center; justify-content:center; padding:1rem;
        }
        .modal-overlay.show { display:flex; }
        .modal-box {
            background:#1e293b; border:1px solid rgba(255,255,255,0.1);
            border-radius:20px; padding:2rem; max-width:500px; width:100%;
        }
        .modal-box h2 { font-size:1.2rem; margin-bottom:1.5rem; }
        .modal-box h2 i { color:#3b82f6; margin-right:0.5rem; }
        .form-group { margin-bottom:1.25rem; }
        .form-group label { display:block; font-size:0.85rem; color:#94a3b8; margin-bottom:0.4rem; font-weight:500; }
        .form-group input, .form-group select {
            width:100%; padding:0.7rem 1rem; border:1px solid rgba(255,255,255,0.1);
            border-radius:10px; background:rgba(255,255,255,0.05); color:#e2e8f0;
            font-size:0.9rem; font-family:inherit;
        }
        .form-group input:focus, .form-group select:focus { outline:none; border-color:#2563eb; }
        .form-actions { display:flex; gap:0.75rem; justify-content:flex-end; margin-top:1.5rem; }

        /* Toast */
        .toast {
            position:fixed; bottom:2rem; right:2rem; padding:0.9rem 1.5rem;
            border-radius:12px; font-size:0.9rem; font-weight:500; z-index:999;
            animation: slideUp 0.3s ease;
        }
        .toast-success { background:#059669; color:white; }
        .toast-error { background:#dc2626; color:white; }
        @keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
        
        .empty-msg { text-align:center; padding:3rem; color:#475569; }
        .empty-msg i { font-size:2.5rem; margin-bottom:1rem; display:block; }

        /* Responsive */
        .table-scroll { overflow-x: auto; }
        @media (max-width:768px) {
            .topbar { padding: 0.8rem 1rem; }
            .container { padding: 1rem; }
            .stats { grid-template-columns: repeat(2, 1fr); }
            .toolbar { flex-direction:column; }
            .search-wrap { min-width:100%; }
        }
    </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
    <div class="login-card">
        <h1><i class="fa-solid fa-shield-halved"></i> Admin <span>Panel</span></h1>
        <p>Masukkan password admin untuk mengelola lisensi.</p>
        <input type="password" id="adminPwd" placeholder="Password Admin" onkeydown="if(event.key==='Enter')doLogin()">
        <div class="login-err" id="loginErr">Password salah!</div>
        <button class="btn btn-primary" style="width:100%; justify-content:center; padding:0.8rem;" onclick="doLogin()">
            <i class="fa-solid fa-right-to-bracket"></i> Masuk
        </button>
    </div>
</div>

<!-- APP -->
<div class="app" id="adminApp">
    <div class="topbar">
        <h1><i class="fa-solid fa-shield-halved"></i> SDKI Pro — License Manager</h1>
        <div class="topbar-actions">
            <button class="btn btn-outline btn-sm" onclick="doLogout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
        </div>
    </div>

    <div class="container">
        <!-- Stats -->
        <div class="stats" id="statsRow">
            <div class="stat-card blue"><div class="num" id="statTotal">-</div><div class="label">Total Lisensi</div></div>
            <div class="stat-card green"><div class="num" id="statAktif">-</div><div class="label">Aktif</div></div>
            <div class="stat-card yellow"><div class="num" id="statBelum">-</div><div class="label">Belum Aktif</div></div>
            <div class="stat-card red"><div class="num" id="statExpired">-</div><div class="label">Expired</div></div>
        </div>

        <!-- Toolbar -->
        <div class="toolbar">
            <div class="search-wrap">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchBox" placeholder="Cari kode, nama, email..." oninput="filterTable()">
            </div>
            <button class="btn btn-primary" onclick="openModal('add')"><i class="fa-solid fa-plus"></i> Tambah Lisensi</button>
            <button class="btn btn-outline" onclick="loadLicenses()"><i class="fa-solid fa-arrows-rotate"></i> Refresh</button>
        </div>

        <!-- Table -->
        <div class="table-wrap">
            <div class="table-scroll">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Email</th>
                            <th>Nama</th>
                            <th>Status</th>
                            <th>Device ID</th>
                            <th>Expired</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="licenseBody">
                        <tr><td colspan="7" class="empty-msg"><i class="fa-solid fa-spinner fa-spin"></i>Memuat data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="formModal">
    <div class="modal-box">
        <h2 id="formTitle"><i class="fa-solid fa-plus-circle"></i> Tambah Lisensi</h2>
        <div class="form-group">
            <label>Email Pembeli <span style="color:#ef4444">*</span></label>
            <input type="email" id="fEmail" placeholder="contoh@email.com">
        </div>
        <div class="form-group">
            <label>Nama Pembeli</label>
            <input type="text" id="fName" placeholder="Opsional">
        </div>
        <div class="form-group">
            <label>Status</label>
            <select id="fStatus">
                <option value="belum">Belum Aktif</option>
                <option value="aktif">Aktif</option>
                <option value="expired">Expired</option>
            </select>
        </div>
        <div class="form-group">
            <label>Expired At <span style="color:#ef4444">*</span></label>
            <input type="date" id="fExpiry">
        </div>
        <div class="form-actions">
            <button class="btn btn-outline" onclick="closeModal()">Batal</button>
            <button class="btn btn-primary" id="formSubmitBtn" onclick="submitForm()"><i class="fa-solid fa-check"></i> Simpan</button>
        </div>
    </div>
</div>


<!-- TOAST -->
<div id="toastEl" class="toast" style="display:none;"></div>

<script>
// ========== CONFIG ==========
// GANTI PROJECT_ID DENGAN PROJECT ID FIREBASE ANDA
const FIRESTORE_PROJECT_ID = 'smartasn-c5d64';
const FIRESTORE_URL = `https://firestore.googleapis.com/v1/projects/${FIRESTORE_PROJECT_ID}/databases/(default)/documents/licenses`;

const ADMIN_PASSWORD = '@Lovechiar4'; // Password panel (silakan ganti)

let adminPwd = '';
let allLicenses = [];
let editMode = false;
let editCode = '';

// Helper untuk Encode ID
function encodeEmail(email) {
    return encodeURIComponent(email.trim().toLowerCase());
}

// ========== LOGIN ==========
function doLogin() {
    const pwd = document.getElementById('adminPwd').value;
    if (!pwd) return;
    
    // Verifikasi password perlindungan interface
    if (pwd === ADMIN_PASSWORD) {
        adminPwd = pwd;
        sessionStorage.setItem('sdki_admin', pwd);
        document.getElementById('loginWrap').style.display = 'none';
        document.getElementById('adminApp').style.display = 'block';
        loadLicenses();
    } else {
        document.getElementById('loginErr').style.display = 'block';
    }
}

function doLogout() {
    adminPwd = '';
    sessionStorage.removeItem('sdki_admin');
    document.getElementById('adminApp').style.display = 'none';
    document.getElementById('loginWrap').style.display = 'flex';
    document.getElementById('adminPwd').value = '';
}

// Auto-login from session
(function() {
    const saved = sessionStorage.getItem('sdki_admin');
    if (saved) {
        adminPwd = saved;
        document.getElementById('loginWrap').style.display = 'none';
        document.getElementById('adminApp').style.display = 'block';
        loadLicenses();
    }
})();

// ========== LOAD DATA ==========
async function loadLicenses() {
    document.getElementById('licenseBody').innerHTML = '<tr><td colspan="7" class="empty-msg"><i class="fa-solid fa-spinner fa-spin"></i> Memuat data...</td></tr>';
    
    try {
        const res = await fetch(FIRESTORE_URL);
        const data = await res.json();
        
        allLicenses = [];
        if (data.documents) {
            allLicenses = data.documents.map(doc => {
                const fields = doc.fields || {};
                const docId = doc.name.split('/').pop(); // "email@domain.com"
                
                return {
                    docId: decodeURIComponent(docId),
                    email: fields.email?.stringValue || decodeURIComponent(docId),
                    name: fields.name?.stringValue || '',
                    status: fields.status?.stringValue || 'belum',
                    deviceId: fields.deviceId?.stringValue || '',
                    expiredAt: fields.expiry?.stringValue || ''
                };
            });
        }
        
        updateStats();
        renderTable(allLicenses);
    } catch (err) {
        document.getElementById('licenseBody').innerHTML = '<tr><td colspan="7" class="empty-msg"><i class="fa-solid fa-triangle-exclamation"></i> Gagal mengambil data dari Firestore. Periksa aturan keamanan Firestore Anda.</td></tr>';
    }
}

function updateStats() {
    const total = allLicenses.length;
    const aktif = allLicenses.filter(l => l.status === 'aktif').length;
    const belum = allLicenses.filter(l => l.status === 'belum' || l.status === '').length;
    const expired = allLicenses.filter(l => l.status === 'expired').length;
    
    document.getElementById('statTotal').textContent = total;
    document.getElementById('statAktif').textContent = aktif;
    document.getElementById('statBelum').textContent = belum;
    document.getElementById('statExpired').textContent = expired;
}

function renderTable(data) {
    const tbody = document.getElementById('licenseBody');
    if (!data.length) {
        tbody.innerHTML = '<tr><td colspan="7" class="empty-msg"><i class="fa-solid fa-box-open"></i> Belum ada data lisensi.</td></tr>';
        return;
    }
    
    tbody.innerHTML = data.map((l, i) => {
        const badgeClass = l.status === 'aktif' ? 'badge-aktif' : l.status === 'expired' ? 'badge-expired' : 'badge-belum';
        const expStr = l.expiredAt ? String(l.expiredAt).slice(0, 10) : '-';
        const emailEsc = (l.email || '').replace(/'/g, "\\'");
        return `<tr>
            <td>${i + 1}</td>
            <td style="font-weight:600; color:#93c5fd;">${l.email || '<span style="color:#475569">-</span>'}</td>
            <td>${l.name || '<span style="color:#475569">-</span>'}</td>
            <td><span class="badge ${badgeClass}">${l.status || 'belum'}</span></td>
            <td style="font-size:0.75rem; color:#64748b; max-width:150px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="${l.deviceId || ''}">${l.deviceId || '<span style="color:#475569">-</span>'}</td>
            <td style="font-size:0.8rem; color:#64748b;">${expStr}</td>
            <td style="white-space:nowrap;">
                <button class="btn btn-outline btn-sm" onclick="openModal('edit','${emailEsc}')" title="Edit"><i class="fa-solid fa-pen"></i></button>
                <button class="btn btn-warning btn-sm" onclick="doReset('${emailEsc}')" title="Reset Device"><i class="fa-solid fa-rotate-left"></i></button>
                <button class="btn btn-danger btn-sm" onclick="doDelete('${emailEsc}')" title="Hapus"><i class="fa-solid fa-trash"></i></button>
            </td>
        </tr>`;
    }).join('');
}

function filterTable() {
    const q = document.getElementById('searchBox').value.toLowerCase();
    if (!q) return renderTable(allLicenses);
    renderTable(allLicenses.filter(l => 
        ((l.docId || '') + (l.name || '') + (l.email || '') + (l.status || '')).toLowerCase().includes(q)
    ));
}

// ========== ADD / EDIT ==========
function openModal(mode, email) {
    editMode = mode === 'edit';
    editCode = email || '';
    
    document.getElementById('formTitle').innerHTML = editMode
        ? '<i class="fa-solid fa-pen-to-square"></i> Edit Lisensi'
        : '<i class="fa-solid fa-plus-circle"></i> Tambah Lisensi';
    
    const emailInput = document.getElementById('fEmail');
    const expiryInput = document.getElementById('fExpiry');
    
    if (editMode) {
        const lic = allLicenses.find(l => l.email === email);
        if (lic) {
            emailInput.value = lic.email;
            emailInput.disabled = true;
            document.getElementById('fName').value = lic.name || '';
            document.getElementById('fStatus').value = lic.status || 'belum';
            expiryInput.value = lic.expiredAt || '';
        }
    } else {
        emailInput.value = '';
        emailInput.disabled = false;
        document.getElementById('fName').value = '';
        document.getElementById('fStatus').value = 'belum';
        
        // Default: 1 tahun dari sekarang
        const nextYear = new Date();
        nextYear.setFullYear(nextYear.getFullYear() + 1);
        expiryInput.value = nextYear.toISOString().split('T')[0];
    }
    
    document.getElementById('formModal').classList.add('show');
}

function closeModal() {
    document.getElementById('formModal').classList.remove('show');
}

async function submitForm() {
    const email = document.getElementById('fEmail').value.trim();
    const name = document.getElementById('fName').value.trim();
    const status = document.getElementById('fStatus').value;
    const expiry = document.getElementById('fExpiry').value;
    
    if (!email || !email.includes('@')) { toast('Email wajib diisi!', 'error'); return; }
    if (!expiry) { toast('Tanggal expired wajib diisi!', 'error'); return; }
    
    // Siapkan body Firestore
    const docData = {
        fields: {
            email: { stringValue: email },
            name: { stringValue: name },
            status: { stringValue: status },
            expiry: { stringValue: expiry }
        }
    };
    
    let url = `${FIRESTORE_URL}/${encodeEmail(email)}`;
    let method = 'PATCH';
    
    if (editMode) {
        // Edit hanya menimpa field spesifik agar data deviceId tidak terhapus
        url += `?updateMask.fieldPaths=name&updateMask.fieldPaths=status&updateMask.fieldPaths=email&updateMask.fieldPaths=expiry`;
    } else {
        // Pembuatan baru
        docData.fields.deviceId = { stringValue: "" };
    }

    try {
        const res = await fetch(url, {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(docData)
        });
        
        if (res.ok) {
            closeModal();
            loadLicenses();
            toast(editMode ? '✅ Lisensi berhasil diperbarui.' : '✅ Lisensi berhasil ditambahkan.', 'success');
        } else {
            toast('Gagal menyimpan ke Firestore.', 'error');
        }
    } catch(err) {
        toast('Koneksi terputus!', 'error');
    }
}

// ========== DELETE ==========
async function doDelete(email) {
    if (!confirm('Hapus lisensi ' + email + '?\nData yang dihapus tidak bisa dikembalikan.')) return;
    
    try {
        const res = await fetch(`${FIRESTORE_URL}/${encodeEmail(email)}`, { method: 'DELETE' });
        if (res.ok) {
            toast('Lisensi berhasil dihapus', 'success');
            loadLicenses();
        } else {
            toast('Gagal menghapus.', 'error');
        }
    } catch (err) {
        toast('Koneksi terputus!', 'error');
    }
}

// ========== RESET DEVICE ==========
async function doReset(email) {
    if (!confirm('Reset device untuk ' + email + '?\nPengguna perlu aktivasi ulang di perangkat baru.')) return;
    
    try {
        const res = await fetch(`${FIRESTORE_URL}/${encodeEmail(email)}?updateMask.fieldPaths=deviceId`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ fields: { deviceId: { stringValue: "" } } })
        });
        if (res.ok) {
            toast('Device ID berhasil direset', 'success');
            loadLicenses();
        } else {
            toast('Gagal mereset.', 'error');
        }
    } catch(err) {
        toast('Koneksi terputus!', 'error');
    }
}

// ========== TOAST ==========
function toast(msg, type) {
    const el = document.getElementById('toastEl');
    el.textContent = msg;
    el.className = 'toast toast-' + type;
    el.style.display = 'block';
    clearTimeout(el._t);
    el._t = setTimeout(() => el.style.display = 'none', 3000);
}
</script>
</body>
</html>
